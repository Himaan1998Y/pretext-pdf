name: Auto-update PRs on master push

on:
  push:
    branches: [master]

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on open PRs when master advances
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'master'
            })
            for (const pr of prs) {
              const { data: status } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              })
              if (status.mergeable_state === 'behind' || status.mergeable_state === 'dirty') {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `⚠️ **master was just updated by a direct push.** This PR is now behind or has conflicts.\n\nTo update your branch:\n\`\`\`bash\ngit fetch origin\ngit rebase origin/master\ngit push --force-with-lease\n\`\`\``
                })
              }
            }
