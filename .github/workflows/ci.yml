name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Contract tests
        run: npm run test:contract

      - name: Unit & validation tests
        run: npm run test:unit

      - name: E2E tests
        run: npm run test:e2e

      - name: All phase tests (phases 2–9)
        run: npm run test:phases

      - name: Smoke test examples (Phase 7)
        run: |
          npm run example:watermark
          npm run example:bookmarks
          npm run example:toc
          npm run example:rtl
          npm run example:encryption

      - name: Smoke test examples (Phase 8)
        run: |
          npm run example:hyperlinks
          npm run example:annotations
          npm run example:assembly
          npm run example:inline
          npm run example:forms
          npm run example:callout

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
