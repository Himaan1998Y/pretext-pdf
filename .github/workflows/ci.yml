name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify README badges match reality
        run: npm run verify:badges:full

      - name: API surface check
        run: npm run api:check

      - name: Contract tests
        run: npm run test:contract

      - name: Unit & validation tests
        run: npm run test:unit

      - name: E2E tests
        run: npm run test:e2e

      - name: All phase tests (phases 2–9)
        run: npm run test:phases

      - name: Coverage report (non-blocking — calibrating thresholds before enforcing)
        if: matrix.node-version == '20.x'
        run: npm run coverage
        continue-on-error: true

      - name: Smoke test examples (Phase 7)
        run: |
          npm run example:watermark
          npm run example:bookmarks
          npm run example:toc
          npm run example:rtl
          npm run example:encryption

      - name: Smoke test examples (Phase 8)
        run: |
          npm run example:hyperlinks
          npm run example:annotations
          npm run example:assembly
          npm run example:inline
          npm run example:forms
          npm run example:callout

      - name: Stress tests (non-blocking — slow, memory-intensive)
        run: npm run test:2f
        continue-on-error: true
        timeout-minutes: 8

      - name: Visual regression
        run: npm run test:visual
        if: matrix.node-version == '20.x'

  ci-ok:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed"

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    needs: [publish]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release $VERSION. See [CHANGELOG.md](CHANGELOG.md) for details."
          fi

          echo "$NOTES" > /tmp/release-notes.md
          echo "notes_path=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file "${{ steps.changelog.outputs.notes_path }}" \
            --verify-tag
