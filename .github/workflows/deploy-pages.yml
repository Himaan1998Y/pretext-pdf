name: Deploy GH Pages demo

on:
  push:
    branches: [master]
    paths:
      - 'demo/static/**'
      - 'fonts/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          set -e
          mkdir -p _site/fonts
          cp -r demo/static/. _site/
          cp fonts/Inter-Regular.ttf fonts/Inter-Bold.ttf _site/fonts/
          # Touch a .nojekyll so GH Pages serves the site as-is (no Jekyll preprocessing)
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
