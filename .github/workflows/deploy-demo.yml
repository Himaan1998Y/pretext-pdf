name: Deploy Demo

on:
  push:
    branches: [master]
    paths:
      - 'demo/stackblitz/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy demo to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 57.129.125.171
          username: antigravity
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 49222
          script: |
            set -e

            # Clone or pull latest pretext-pdf
            if [ -d ~/pretext-pdf-demo ]; then
              cd ~/pretext-pdf-demo && git pull
            else
              git clone https://github.com/Himaan1998Y/pretext-pdf.git ~/pretext-pdf-demo
            fi

            # Build Docker image from the demo subfolder
            docker build -t pretext-pdf-demo ~/pretext-pdf-demo/demo/stackblitz/

            # Replace running container
            docker stop pretext-pdf-demo 2>/dev/null || true
            docker rm pretext-pdf-demo 2>/dev/null || true
            docker run -d \
              --name pretext-pdf-demo \
              --restart unless-stopped \
              -p 3001:3000 \
              pretext-pdf-demo

            echo "Demo deployed at http://57.129.125.171:3001"
