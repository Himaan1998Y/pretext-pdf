<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pretext-pdf — Live Demo</title>
  <meta name="description" content="Edit JSON, render a real PDF in your browser. No install. No server. Built on pretext-pdf.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a2e; }

    header { background: #1a1a2e; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    header h1 { font-size: 16px; font-weight: 600; }
    header a { color: #7cb3ff; font-size: 13px; text-decoration: none; }
    header a:hover { text-decoration: underline; }
    .badge { background: #0070f3; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .pill { background: #2a2a4e; color: #aaa; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
    .spacer { flex: 1; }
    .hint { font-size: 11px; color: #888; }
    .hint kbd { background: #3a3a5e; padding: 1px 5px; border-radius: 3px; font-family: inherit; font-size: 10px; color: #ddd; }

    .tabs { display: flex; background: #2a2a4e; padding: 0 16px; }
    .tab { padding: 10px 20px; font-size: 13px; font-weight: 500; color: #aaa; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none; }
    .tab:hover { color: #fff; }
    .tab.active { color: #fff; border-bottom-color: #0070f3; }

    .main { display: flex; height: calc(100vh - 92px); }

    .editor-pane { width: 50%; display: flex; flex-direction: column; border-right: 1px solid #ddd; }
    .editor-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #fff; border-bottom: 1px solid #eee; }
    .btn { padding: 6px 16px; font-size: 13px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #0070f3; color: #fff; }
    .btn-primary:hover { background: #005ed4; }
    .btn-primary:disabled { background: #999; cursor: not-allowed; }
    .btn-secondary { background: #eee; color: #333; }
    .btn-secondary:hover { background: #ddd; }
    .btn-secondary:disabled { background: #eee; color: #aaa; cursor: not-allowed; }
    .status { font-size: 12px; color: #888; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status.error { color: #e53e3e; }
    .status.ok { color: #38a169; }

    textarea { flex: 1; width: 100%; padding: 12px; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace; font-size: 12.5px; line-height: 1.5; border: none; outline: none; resize: none; background: #fafafa; tab-size: 2; }

    .preview-pane { width: 50%; background: #e8e8e8; display: flex; flex-direction: column; }
    .preview-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #fff; border-bottom: 1px solid #eee; font-size: 12px; color: #888; }
    iframe { flex: 1; border: none; background: #fff; }
    .placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; font-size: 14px; text-align: center; line-height: 1.6; padding: 20px; gap: 16px; }
    .placeholder.error { color: #e53e3e; }
    .placeholder code { background: #2a2a4e; color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
    .placeholder small { color: #aaa; font-size: 12px; }

    /* Spinner — used during boot and re-render */
    .spinner { width: 36px; height: 36px; border: 3px solid #ddd; border-top-color: #0070f3; border-radius: 50%; animation: spin 0.7s linear infinite; }
    .spinner.small { width: 14px; height: 14px; border-width: 2px; display: inline-block; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .placeholder.error .spinner { display: none; }
  </style>
</head>
<body>

    <a href="https://www.npmjs.com/package/pretext-pdf" target="_blank" rel="noopener">npm</a>
    <a href="https://www.npmjs.com/package/pretext-pdf-mcp" target="_blank" rel="noopener">MCP server</a>
    <span class="spacer"></span>

        <span class="status" id="status"></span>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="Loading editor…"></textarea>
    </div>
    <div class="preview-pane">

        <span class="spacer"></span>
      </div>

        <div class="spinner"></div>
        <div>Loading <code>pretext-pdf</code> + Inter fonts…</div>
        <small>First load fetches ~1 MB total, then everything renders locally.</small>

      <iframe id="pdfFrame" style="display:none" title="PDF preview"></iframe>
    </div>

const statusEl = document.getElementById('status')
const renderBtn = document.getElementById('renderBtn')
const downloadBtn = document.getElementById('downloadBtn')
const pdfFrame = document.getElementById('pdfFrame')
const placeholder = document.getElementById('placeholder')
const previewInfo = document.getElementById('previewInfo')
const versionBadge = document.getElementById('versionBadge')

let render = null
let interRegular = null
let interBold = null

async function fetchBytes(url) {
  const res = await fetch(url)
  if (!res.ok) throw new Error(`Failed to fetch ${url}: HTTP ${res.status}`)
  return new Uint8Array(await res.arrayBuffer())
}

async function boot() {
  try {
    const [mod, regularBytes, boldBytes] = await Promise.all([
      import(`https://esm.sh/pretext-pdf@${PRETEXT_PDF_VERSION}`),
      fetchBytes('./fonts/Inter-Regular.ttf'),
      fetchBytes('./fonts/Inter-Bold.ttf'),
    ])
    render = mod.render
    interRegular = regularBytes
    interBold = boldBytes
    versionBadge.textContent = 'v' + PRETEXT_PDF_VERSION
    renderBtn.disabled = false
    renderBtn.textContent = 'Generate PDF'
    editor.value = JSON.stringify(PRESETS.invoice, null, 2)
    await renderPdf()
  } catch (err) {
    versionBadge.textContent = 'load failed'
    placeholder.className = 'placeholder error'
    placeholder.innerHTML = `Failed to load <code>pretext-pdf</code> from esm.sh.<br>${err.message}<br><br><small>Reload the page to retry. If the error persists, try a different browser or check your network.</small>`
  }
}

// ─── App State ──────────────────────────────────────────────────────────────

let currentTab = 'invoice'
let currentBlobUrl = null
let lastPdfBlob = null

// ─── Tab Switching ──────────────────────────────────────────────────────────

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelector('.tab.active').classList.remove('active')
    tab.classList.add('active')
    currentTab = tab.dataset.tab
    editor.value = JSON.stringify(PRESETS[currentTab], null, 2)
    clearPreview()
    renderPdf()
  })
})

// ─── Render ─────────────────────────────────────────────────────────────────

renderBtn.addEventListener('click', renderPdf)
downloadBtn.addEventListener('click', downloadPdf)

async function renderPdf() {
  if (!render) return
  renderBtn.disabled = true
  downloadBtn.disabled = true
  statusEl.innerHTML = '<span class="spinner small"></span>Rendering…'
  statusEl.className = 'status'

  let userDoc
  try {
    userDoc = JSON.parse(editor.value)
  } catch (e) {
    statusEl.textContent = 'Invalid JSON: ' + e.message.replace(/^JSON\.parse: /, '')
    statusEl.className = 'status error'
    renderBtn.disabled = false
    return
  }

  // Inject browser-supplied Inter font bytes so the lib never falls through
  // to its Node-only bundled-font path. User-provided fonts win in collectNeededFonts().
  const docWithFonts = {
    ...userDoc,
    fonts: [
      { family: 'Inter', weight: 400, style: 'normal', src: interRegular },
      { family: 'Inter', weight: 700, style: 'normal', src: interBold },
      ...(userDoc.fonts ?? []),
    ],
  }

  try {
    const t0 = performance.now()
    const pdf = await render(docWithFonts)
    const ms = (performance.now() - t0).toFixed(0)
    const blob = new Blob([pdf], { type: 'application/pdf' })
    const sizeKb = (blob.size / 1024).toFixed(1)

    if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl)
    currentBlobUrl = URL.createObjectURL(blob)
    lastPdfBlob = blob

    pdfFrame.src = currentBlobUrl
    pdfFrame.style.display = 'block'
    placeholder.style.display = 'none'
    previewInfo.textContent = `${sizeKb} KB  \u00b7  ${ms}ms  \u00b7  rendered locally`
    statusEl.textContent = 'Done'
    statusEl.className = 'status ok'
    downloadBtn.disabled = false
  } catch (err) {
    const msg = err && err.message ? err.message : String(err)
    const code = err && err.code ? err.code + ': ' : ''
    statusEl.textContent = code + msg
    statusEl.className = 'status error'
  } finally {
    renderBtn.disabled = false
  }
}

function downloadPdf() {
  if (!lastPdfBlob || !currentBlobUrl) return
  const a = document.createElement('a')
  a.href = currentBlobUrl
  a.download = currentTab + '.pdf'
  a.click()
}

function clearPreview() {
  if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl)
  currentBlobUrl = null
  lastPdfBlob = null
  pdfFrame.style.display = 'none'
  placeholder.style.display = 'flex'
  placeholder.className = 'placeholder'
  placeholder.textContent = 'Generating PDF…'
  previewInfo.textContent = 'Rendering…'
  downloadBtn.disabled = true
  statusEl.textContent = ''
  statusEl.className = 'status'
}

// ─── Keyboard Shortcuts ─────────────────────────────────────────────────────

editor.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault()
    renderPdf()
    return
  }
  if (e.key === 'Tab') {
    e.preventDefault()
    const start = editor.selectionStart
    const end = editor.selectionEnd
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end)
    editor.selectionStart = editor.selectionEnd = start + 2
  }
})

// ─── Boot ───────────────────────────────────────────────────────────────────

boot()
</script>
