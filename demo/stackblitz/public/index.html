    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a2e; }

    header { background: #1a1a2e; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    header h1 { font-size: 16px; font-weight: 600; }
    header a { color: #7cb3ff; font-size: 13px; text-decoration: none; }
    header a:hover { text-decoration: underline; }
    .badge { background: #0070f3; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .spacer { flex: 1; }
    .hint { font-size: 11px; color: #888; }
    .hint kbd { background: #3a3a5e; padding: 1px 5px; border-radius: 3px; font-family: inherit; font-size: 10px; }

    .tabs { display: flex; background: #2a2a4e; padding: 0 16px; }
    .tab { padding: 10px 20px; font-size: 13px; font-weight: 500; color: #aaa; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none; }
    .tab:hover { color: #fff; }
    .tab.active { color: #fff; border-bottom-color: #0070f3; }

    .main { display: flex; height: calc(100vh - 92px); }

    .editor-pane { width: 50%; display: flex; flex-direction: column; border-right: 1px solid #ddd; }
    .editor-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #fff; border-bottom: 1px solid #eee; }
    .btn { padding: 6px 16px; font-size: 13px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #0070f3; color: #fff; }
    .btn-primary:hover { background: #005ed4; }
    .btn-primary:disabled { background: #999; cursor: not-allowed; }
    .btn-secondary { background: #eee; color: #333; }
    .btn-secondary:hover { background: #ddd; }
    .btn-secondary:disabled { background: #eee; color: #aaa; cursor: not-allowed; }
    .status { font-size: 12px; color: #888; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status.error { color: #e53e3e; }
    .status.ok { color: #38a169; }

    textarea { flex: 1; width: 100%; padding: 12px; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace; font-size: 12.5px; line-height: 1.5; border: none; outline: none; resize: none; background: #fafafa; tab-size: 2; }

    .preview-pane { width: 50%; background: #e8e8e8; display: flex; flex-direction: column; }
    .preview-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #fff; border-bottom: 1px solid #eee; font-size: 12px; color: #888; }
    .preview-toolbar .spacer { flex: 1; }
    iframe { flex: 1; border: none; background: #fff; }
    .placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #999; font-size: 14px; text-align: center; line-height: 1.6; }

// ─── App State ──────────────────────────────────────────────────────────────

let currentTab = 'invoice';
let currentBlobUrl = null;
let lastPdfBlob = null;

const editor = document.getElementById('editor');
const statusEl = document.getElementById('status');
const renderBtn = document.getElementById('renderBtn');
const downloadBtn = document.getElementById('downloadBtn');
const pdfFrame = document.getElementById('pdfFrame');
const placeholder = document.getElementById('placeholder');
const previewInfo = document.getElementById('previewInfo');

// ─── Version Badge ──────────────────────────────────────────────────────────

fetch('/version').then(r => r.json()).then(d => {
  document.getElementById('versionBadge').textContent = 'v' + d.version;
}).catch(() => {
  document.getElementById('versionBadge').textContent = 'pretext-pdf';
});

// ─── Tab Switching ──────────────────────────────────────────────────────────

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelector('.tab.active').classList.remove('active');
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    editor.value = JSON.stringify(PRESETS[currentTab], null, 2);
    clearPreview();
    renderPdf();
  });
});

// ─── Render ─────────────────────────────────────────────────────────────────

renderBtn.addEventListener('click', renderPdf);
downloadBtn.addEventListener('click', downloadPdf);

async function renderPdf() {
  renderBtn.disabled = true;
  downloadBtn.disabled = true;
  statusEl.textContent = 'Rendering...';
  statusEl.className = 'status';

  // Validate JSON locally first
  let doc;
  try {
    doc = JSON.parse(editor.value);
  } catch (e) {
    statusEl.textContent = 'Invalid JSON: ' + e.message.replace(/^JSON\.parse: /, '');
    statusEl.className = 'status error';
    renderBtn.disabled = false;
    return;
  }

  try {
    const res = await fetch('/render', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(doc),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error + ': ' + err.message);
    }

    const blob = await res.blob();
    const renderTime = res.headers.get('X-Render-Time') || '?';
    const size = (blob.size / 1024).toFixed(1);

    // Revoke previous blob to prevent memory leak
    if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
    currentBlobUrl = URL.createObjectURL(blob);
    lastPdfBlob = blob;

    pdfFrame.src = currentBlobUrl;
    pdfFrame.style.display = 'block';
    placeholder.style.display = 'none';
    previewInfo.textContent = size + ' KB  \u00b7  ' + renderTime + 'ms';
    statusEl.textContent = 'Done';
    statusEl.className = 'status ok';
    downloadBtn.disabled = false;
  } catch (err) {
    statusEl.textContent = err.message;
    statusEl.className = 'status error';
  } finally {
    renderBtn.disabled = false;
  }
}

function downloadPdf() {
  if (!lastPdfBlob) return;
  const a = document.createElement('a');
  a.href = currentBlobUrl;
  a.download = currentTab + '.pdf';
  a.click();
}

function clearPreview() {
  if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
  currentBlobUrl = null;
  lastPdfBlob = null;
  pdfFrame.style.display = 'none';
  placeholder.style.display = 'flex';
  placeholder.textContent = 'Generating PDF...';
  previewInfo.textContent = 'Rendering...';
  downloadBtn.disabled = true;
  statusEl.textContent = '';
  statusEl.className = 'status';
}

// ─── Keyboard Shortcuts ─────────────────────────────────────────────────────

editor.addEventListener('keydown', (e) => {
  // Ctrl+Enter → render
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    renderPdf();
    return;
  }
  // Tab → insert 2 spaces instead of changing focus
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
  }
});

// ─── Auto-render on load ────────────────────────────────────────────────────

editor.value = JSON.stringify(PRESETS.invoice, null, 2);
renderPdf();
