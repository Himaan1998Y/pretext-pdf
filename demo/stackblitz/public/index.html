    header { background: #1a1a2e; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }

    header a { color: #7cb3ff; font-size: 13px; text-decoration: none; }

    .badge { background: #0070f3; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }

    .tabs { display: flex; background: #2a2a4e; padding: 0 16px; }
    .tab { padding: 10px 20px; font-size: 13px; font-weight: 500; color: #aaa; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab:hover { color: #fff; }
    .tab.active { color: #fff; border-bottom-color: #0070f3; }

    .btn-primary:hover { background: #005ed4; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .status { font-size: 12px; color: #888; }
    .status.error { color: #e53e3e; }
    .status.ok { color: #38a169; }

    textarea { flex: 1; width: 100%; padding: 12px; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12.5px; line-height: 1.5; border: none; outline: none; resize: none; background: #fafafa; tab-size: 2; }

    .preview-pane { width: 50%; background: #e8e8e8; display: flex; flex-direction: column; }
    .preview-toolbar { padding: 8px 12px; background: #fff; border-bottom: 1px solid #eee; font-size: 12px; color: #888; }
    iframe { flex: 1; border: none; background: #fff; }
    .placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #999; font-size: 14px; }

// ─── App Logic ────────────────────────────────────────────────────────────────

const editor = document.getElementById('editor')
const status = document.getElementById('status')
const renderBtn = document.getElementById('renderBtn')
const pdfFrame = document.getElementById('pdfFrame')
const placeholder = document.getElementById('placeholder')
const previewInfo = document.getElementById('previewInfo')
let currentTab = 'invoice'

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelector('.tab.active').classList.remove('active')
    tab.classList.add('active')
    currentTab = tab.dataset.tab
    editor.value = JSON.stringify(PRESETS[currentTab], null, 2)
    status.textContent = ''
    status.className = 'status'
  })
})

// Initialize
editor.value = JSON.stringify(PRESETS.invoice, null, 2)

// Render
async function renderPdf() {
  renderBtn.disabled = true
  status.textContent = 'Rendering...'
  status.className = 'status'

  try {
    const doc = JSON.parse(editor.value)
    const t0 = performance.now()
    const res = await fetch('/render', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(doc),
    })

    if (!res.ok) {
      const err = await res.json()
      throw new Error(`${err.error}: ${err.message}`)
    }

    const blob = await res.blob()
    const renderTime = res.headers.get('X-Render-Time') || (performance.now() - t0).toFixed(0)
    const size = (blob.size / 1024).toFixed(1)

    const url = URL.createObjectURL(blob)
    pdfFrame.src = url
    pdfFrame.style.display = 'block'
    placeholder.style.display = 'none'
    previewInfo.textContent = `${size} KB  ·  rendered in ${renderTime}ms`
    status.textContent = 'Done'
    status.className = 'status ok'
  } catch (err) {
    status.textContent = err.message
    status.className = 'status error'
  } finally {
    renderBtn.disabled = false
  }
}

// Ctrl+Enter to render
editor.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault()
    renderPdf()
  }
})
